name: SOP GitHub Issue reminders

on:
  push:
    branches:
[[TRACKED_BRANCHES_YAML]]
    paths:
      - "sop/stages/*/dispatch/*.yaml"
      - "sop/stages/*/submissions/**/submission-manifest.yaml"
  workflow_dispatch:
    inputs:
      ref:
        description: Exact pushed ref to retry
        required: true
      commit:
        description: Exact commit SHA to retry
        required: true

permissions:
  contents: read
  issues: write

concurrency:
  group: sop-notifications-${{ github.ref }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central main
        uses: actions/checkout@v6
        with:
          ref: [[MAIN_BRANCH_JSON]]
          fetch-depth: 0

      - name: Fetch registered member refs
        run: git fetch origin --prune

      - name: Refresh trusted state in the runner only
        env:
          SOP_PROJECT_ROOT: [[PROJECT_ROOT_JSON]]
        run: |
          python .github/scripts/sop_coordinator_cli.py refresh-project-state "$SOP_PROJECT_ROOT" \
            --remote origin --validate-remote \
            --member-cli .github/scripts/sop_member_cli.py

      - name: Deliver idempotent reminders
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOP_PROJECT_ROOT: [[PROJECT_ROOT_JSON]]
          PUSH_REF: ${{ github.event.inputs.ref || github.ref }}
          PUSH_SHA: ${{ github.event.inputs.commit || github.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import importlib.util
          import json
          import os
          import pathlib
          import subprocess

          script = pathlib.Path(".github/scripts/sop_issue_notifier.py")
          spec = importlib.util.spec_from_file_location("sop_issue_notifier", script)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          before = os.environ.get("PUSH_BEFORE", "")
          sha = os.environ["PUSH_SHA"]
          changed = []
          if before and set(before) != {"0"}:
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", before, sha], text=True
              ).splitlines()
          events = module.discover_events(
              pathlib.Path(os.environ["SOP_PROJECT_ROOT"]),
              os.environ["PUSH_REF"],
              sha,
              changed,
          )
          for event in events:
              command = [
                  "python", str(script),
                  "--event", event["event"],
                  "--assignment", event["assignment"],
                  "--commit", sha,
                  "--run-url", os.environ["RUN_URL"],
                  "--detail", event.get("detail", ""),
              ]
              subprocess.run(command, check=True)
          print(json.dumps({"notification_events": len(events)}))
          PY
