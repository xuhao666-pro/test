name: SOP 中央状态与 README 看板

on:
  push:
    branches:
[[TRACKED_BRANCHES_YAML]]
    paths:
      - [[STATE_PATH_JSON]]
      - [[STAGES_STATE_GLOB_JSON]]
      - [[SUBMISSIONS_GLOB_JSON]]
      - [[ACCEPTANCES_GLOB_JSON]]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sop-state-dashboard
  cancel-in-progress: false

jobs:
  refresh-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central main
        uses: actions/checkout@v6
        with:
          ref: [[MAIN_BRANCH_JSON]]
          fetch-depth: 0

      - name: Fetch registered member refs
        run: git fetch origin --prune

      - name: Refresh validated state and render dashboard
        env:
          SOP_PROJECT_ROOT: [[PROJECT_ROOT_JSON]]
          SOP_STATE_PATH: [[STATE_PATH_JSON]]
          SOP_DASHBOARD_PATH: [[DASHBOARD_PATH_JSON]]
          SOP_README_PATH: [[README_PATH_JSON]]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python .github/scripts/sop_coordinator_cli.py refresh-project-state "$SOP_PROJECT_ROOT" \
            --remote origin --validate-remote \
            --member-cli .github/scripts/sop_member_cli.py
          python .github/scripts/sop_readme_dashboard.py \
            --state "$SOP_STATE_PATH" \
            --output "$SOP_DASHBOARD_PATH" \
            --readme "$SOP_README_PATH"

      - name: Commit one central snapshot
        env:
          SOP_STATE_PATH: [[STATE_PATH_JSON]]
          SOP_DASHBOARD_PATH: [[DASHBOARD_PATH_JSON]]
          SOP_README_PATH: [[README_PATH_JSON]]
          SOP_MAIN_BRANCH: [[MAIN_BRANCH_JSON]]
        run: |
          if [ -z "$(git status --porcelain -- "$SOP_STATE_PATH" "$SOP_DASHBOARD_PATH" "$SOP_README_PATH")" ]; then
            echo "Central state and dashboard are already current."
            exit 0
          fi
          git add -- "$SOP_STATE_PATH" "$SOP_DASHBOARD_PATH" "$SOP_README_PATH"
          git commit -m "sop: refresh validated state and README dashboard"
          git push origin "HEAD:$SOP_MAIN_BRANCH"
